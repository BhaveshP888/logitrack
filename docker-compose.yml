version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: logitrack-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: logitrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logitrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: logitrack-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/logitrack?schema=public
      PORT: 3001
      FRONTEND_URL: http://localhost:8080
      JWT_SECRET: dev-fallback-super-secret-key-12345
      ADMIN_PASS: adminlogin1212
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3001
        VITE_WS_URL: http://localhost:3001
    container_name: logitrack-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
